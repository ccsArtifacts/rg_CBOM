version: '3.9'

services:
  # PostgreSQL - Data store for SBOM/CBOM
  postgres:
    image: postgres:15-alpine
    container_name: pqc-postgres
    environment:
      POSTGRES_DB: pqc_inventory
      POSTGRES_USER: pqc_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pqc_secure_pass_2024}
      POSTGRES_INITDB_ARGS: "-c ssl=on -c ssl_cert_file=/var/lib/postgresql/server.crt -c ssl_key_file=/var/lib/postgresql/server.key"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./config/postgres/server.crt:/var/lib/postgresql/server.crt:ro
      - ./config/postgres/server.key:/var/lib/postgresql/server.key:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pqc_user -d pqc_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pqc-network

  # Neo4j - Graph database for dependency mapping
  neo4j:
    image: neo4j:5.13-community
    container_name: pqc-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-pqc_graph_2024}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_initial_size: 512M
      NEO4J_server_memory_heap_max_size: 1G
      NEO4J_dbms_security_auth_minimum_password_length: 16
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    ports:
      - "7687:7687"
      - "7474:7474"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pqc-network

  # Elasticsearch - Immutable audit logs (WORM)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: pqc-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.enrollment.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-pqc_elastic_2024}
      xpack.security.transport.ssl.enabled: "true"
      xpack.security.transport.ssl.verification_mode: certificate
      xpack.security.http.ssl.enabled: "true"
      xpack.security.http.ssl.verification_mode: certificate
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./config/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-pqc_elastic_2024} https://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pqc-network

  # Redis - Caching & Session management
  redis:
    image: redis:7.2-alpine
    container_name: pqc-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-pqc_redis_2024} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pqc-network

  # HashiCorp Vault - Secret management
  vault:
    image: vault:1.15.0
    container_name: pqc-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: pqc-dev-token-2024
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    volumes:
      - vault_data:/vault/data
      - ./config/vault/init.sh:/vault/init.sh:ro
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pqc-network

  # Backend API - Go microservices
  pqc-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pqc-backend
    environment:
      PORT: 8080
      ENV: production
      DATABASE_URL: postgresql://pqc_user:${DB_PASSWORD:-pqc_secure_pass_2024}@postgres:5432/pqc_inventory?sslmode=require
      NEO4J_URI: neo4j://neo4j:${NEO4J_PASSWORD:-pqc_graph_2024}@neo4j:7687
      ELASTICSEARCH_URL: https://elastic:${ELASTIC_PASSWORD:-pqc_elastic_2024}@elasticsearch:9200
      REDIS_URL: redis://:${REDIS_PASSWORD:-pqc_redis_2024}@redis:6379/0
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: pqc-dev-token-2024
      LOG_LEVEL: info
      TLS_CERT: /etc/pqc/tls/server.crt
      TLS_KEY: /etc/pqc/tls/server.key
    volumes:
      - ./config/tls:/etc/pqc/tls:ro
      - ./data/uploads:/app/data/uploads
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pqc-network

  # Frontend - React application
  pqc-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pqc-frontend
    environment:
      REACT_APP_API_URL: https://localhost:8080/api
      REACT_APP_WS_URL: wss://localhost:8080/ws
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "3000:3000"
    depends_on:
      - pqc-backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pqc-network

  # Reverse Proxy - Nginx with SSL/TLS
  nginx:
    image: nginx:1.25-alpine
    container_name: pqc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/tls:/etc/nginx/tls:ro
      - ./config/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
    depends_on:
      - pqc-backend
      - pqc-frontend
    networks:
      - pqc-network

networks:
  pqc-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  elasticsearch_data:
  redis_data:
  vault_data:
