name: Quality & Release

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Run backend quality checks
        run: |
          cd backend
          go mod download
          go test -v -coverprofile=coverage.out ./...

      - name: Run frontend quality checks
        run: |
          cd frontend
          npm ci
          npm run build
          npm test -- --coverage --watchAll=false

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=pqc-platform
            -Dsonar.organization=pqc-org

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ quality ]
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release Notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "# Release $TAG_NAME" > release_notes.md
          echo "" >> release_notes.md
          echo "## What's Changed" >> release_notes.md
          git log $(git describe --tags --abbrev=0)..HEAD --oneline >> release_notes.md || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: [ quality ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [ backend, frontend ]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pqc-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/pqc-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Generate API docs
        run: |
          cd backend
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/main.go || true

      - name: Commit and push docs
        if: github.event_name == 'push'
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "docs: auto-generated documentation"
            git push
          )
        continue-on-error: true
